<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body background="IMAGE/if2.jpeg">
    <h1 align="center">Student Registration Form</h1>
    <form>
        <table align="center" cellpadding="5">
            <tr>
                <td>Student Name</td>
                <td><input type="text" required></td>
            </tr>
            <tr>
                <td>Date of Birth</td>
               <td><input type="date"></td> 
            </tr>
             <tr>
                <td>Email</td>
                <td><input type="email" required></td>
            
            </tr>
             <tr>
                <td>Password</td>
                <td><input type="password" required placeholder="must be 8 characters long"></td>
            </tr>
             <tr>
                <td>Phone No</td>
                <td><input type="number" required></td>
            </tr>
             <tr>
                <td>Address</td>
                <td><textarea></textarea></td>
            </tr>
            <tr>
                <td>Gender</td>
                <td><input type="radio" name="r1" required>Male
                <input type="radio" name="r1" required>Female</td>
            </tr>
             <tr>
                <td>Hobbies</td>
                <td><input type="checkbox" >Swimming
                    <input type="checkbox" >Boxing
                    <input type="checkbox" >Cooking
                    <input type="checkbox" >Cricket
                </td>

            </tr>
             <tr>
                <td>Qualification</td>
                <td><select>
                    <option>BCA</option>
                    <option>MBA</option>
                    <option>MCA</option>
                    <option>BBA</option>
                    <option>BA</option>
                    <option>MA</option>
                </select></td>
            </tr>
        
            <td colspan="2" ALIGN="center"><input type="image" src="IMAGE/IF.png" width="50" height="50"></td>
            </tr>

            
        </table>
        
    
    </form>
</body>
</html>
