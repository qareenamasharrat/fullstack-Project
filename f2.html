<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body background="IMAGE/i3.png">
    <h1 align="center">Form Validation</h1>
    <table align="center">
        <TR>
            <TD>
    <h2>Date Field Restrictions</h2>
    <form>
        Enter a date after 2000-01-01
        <input type="date" min="2000-01-01"><br>
        <h2>Enter a date before 1980-01-01</h2>
        <input type="date" max="2025-12-31"><br>
        <h2>Birthday (date and time)</h2>
        <input type="datetime-local"><br>
        <h2>Birthday (month and year)</h2>
        <input type="month"><br>
        <h2>Age</h2>
        <input type="number" min="1" max="5"><br>
        <h2>Experience</h2>
        <input type="number" min="2" max="30" step="2" value="2"><br>
        <input type="image" src="IMAGE/IF.png" WIDTH="50" HEIGHT="50" align="center">
    </form>
    </TD>
    </TR>
    </table>
    
</body>
</html>
